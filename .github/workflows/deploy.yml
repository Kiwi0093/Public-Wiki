name: Deploy-Wiki-Site
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Debug Path
        run: |
          echo "Current directory structure:"
          find . -maxdepth 3 -not -path '*/.*'

      - name: 📂 Prepare Folders (搬移 Wiki 和 Blog)
        run: |
          mkdir -p docs blog static/img
          find . -type d -iname "Wiki" -not -path "./docs*" -exec cp -R {}/. ./docs/ \; 2>/dev/null || true
          find . -type d -iname "Blog" -not -path "./blog*" -exec cp -R {}/. ./blog/ \; 2>/dev/null || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 🐍 MDX Syntax Fix
        run: |
          # 確保專案根目錄有這個 fix-mdx.py
          if [ -f "fix-mdx.py" ]; then
            python3 fix-mdx.py
          fi

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 建議用 LTS 20，最穩
          cache: 'npm'

      - name: 📦 Install & Build
        run: |
          # 使用 npm ci (Clean Install) 會嚴格遵循 package-lock.json
          npm ci
          
          # 預防萬一，執行 docusaurus 的清理指令
          npx docusaurus clear
          
          # 執行編譯
          npm run build -- --locale zh-Hant
        env:
          # 官方解決方案提到的環境變數，現在是雙重保險
          PROGRESS: false
          DBAR: false
          NODE_OPTIONS: "--no-warnings"
              
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
