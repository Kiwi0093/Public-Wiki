name: Deploy-Wiki-Site
on:
  push:
    branches: [main]
  workflow_dispatch:

# 強制使用 Node 24 解決警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 設定為 0 才能抓到完整的 Git 歷史日期

      - name: 🔍 Debug Path (重要：請在 Log 查看此處輸出)
        run: |
          echo "Current directory structure:"
          find . -maxdepth 3 -not -path '*/.*'

      - name: 🏗️ Distribute Content (Enhanced)
        run: |
          # 1. 建立標準的小寫目錄
          mkdir -p docs blog static/img
          
          # 2. 使用 -iname 忽略大小寫搜尋並搬移
          # 使用 ./. 確保複製目錄內容而非目錄本身
          find . -type d -iname "Wiki" -not -path "./docs*" -exec cp -R {}/. ./docs/ \; 2>/dev/null || true
          find . -type d -iname "Blog" -not -path "./blog*" -exec cp -R {}/. ./blog/ \; 2>/dev/null || true
          find . -type d -iname "Assets" -not -path "./static*" -exec cp -R {}/img/. ./static/img/ \; 2>/dev/null || true
          
          # 3. 【關鍵修復】確保 blog 下的檔案都有日期前綴
          # Docusaurus 如果沒看到 YYYY-MM-DD- 就會忽略該文章
          cd blog
          for f in *.md; do
            if [[ ! $f =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}- ]]; then
              echo "Fixing filename: $f"
              mv "$f" "2026-03-23-$f"
            fi
          done
          cd ..

          # 4. 檢查 docs 避免空目錄報錯
          if [ -z "$(ls -A docs)" ]; then
              echo "# Welcome to Kiwi Wiki" > docs/intro.md
          fi
          
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 直接攻頂 Node 24

      - name: 📦 Install & Build
        run: |
          # 如果沒有 package.json，這步會失敗，請確認你的 Repo 根目錄有這個檔
          npm install
          npm run build

      - name: 🔍 Check Build Result
        run: |
          echo "Check if index.html exists in build:"
          ls -lh build/index.html
          echo "Check if there are any other html files:"
          find build -name "*.html"
      
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
