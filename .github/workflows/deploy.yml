name: Deploy-Wiki-Site
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Debug Path
        run: |
          echo "Current directory structure:"
          find . -maxdepth 3 -not -path '*/.*'

      - name: 📂 Prepare Folders (搬移 Wiki 和 Blog)
        run: |
          mkdir -p docs blog static/img
          # 搬移檔案 (這部分維持你的邏輯)
          find . -type d -iname "Wiki" -not -path "./docs*" -exec cp -R {}/. ./docs/ \; 2>/dev/null || true
          find . -type d -iname "Blog" -not -path "./blog*" -exec cp -R {}/. ./blog/ \; 2>/dev/null || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 🐍 終極修復：由 Python 統一處理所有 MDX 語法
        run: |
          # 我們把之前的 sed 邏輯全部整合進 fix-mdx.py
          python3 fix-mdx.py

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install & Build
        run: |
          npm install
          # 執行 build 前先清快取，確保讀到 Python 改過的最新硬碟檔案
          npx docusaurus clear
          npm run build

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
