name: Deploy-Wiki-Site
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 解決你的第二個警告

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4

      - name: Debug Content Path
        run: |
          echo "Checking if content_staging exists..."
          ls -R # 這行會印出目錄結構，幫我們抓鬼
          
      - name: Distribute Obsidian Content
        run: |
          if [ -d "content_staging" ]; then
            echo "Found sync folder, distributing content..."
            mkdir -p docs blog static/img
            cp -R content_staging/Wiki/* ./docs/ || true
            cp -R content_staging/Blog/* ./blog/ || true
            cp -R content_staging/Assets/img/* ./static/img/ || true
          else
            echo "Error: content_staging not found!"
            exit 1 # 強制報錯，方便我們抓問題
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 暫時不使用 cache，避免找不到 lock file 報錯

      - name: Install Dependencies
        run: npm install

      - name: Build Docusaurus
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
