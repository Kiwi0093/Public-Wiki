name: Deploy-Wiki-Site
on:
  push:
    branches: [main]
  workflow_dispatch:

# 強制使用 Node 24 解決警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 設定為 0 才能抓到完整的 Git 歷史日期

      - name: 🔍 Debug Path (重要：請在 Log 查看此處輸出)
        run: |
          echo "Current directory structure:"
          find . -maxdepth 3 -not -path '*/.*'

      - name: 🏗️ Distribute Content (MDX Fixer)
        run: |
          mkdir -p docs blog static/img
          find . -type d -iname "Wiki" -not -path "./docs*" -exec cp -R {}/. ./docs/ \; 2>/dev/null || true
          find . -type d -iname "Blog" -not -path "./blog*" -exec cp -R {}/. ./blog/ \; 2>/dev/null || true
          
          # 1. 刪除 image: null
          find ./blog ./docs -name "*.md" -exec sed -i '/^image: null$/d' {} +

          # 2. 修復空連結 [Text]() -> [Text](#) 避免報錯
          find ./blog ./docs -name "*.md" -exec sed -i 's/\[\([^]]*\)\]()/[\1](#)/g' {} +

          # 3. 修復常見的未閉合角括號問題 (將 < 替換為字元實體)
          # 這裡針對常見的配置標記進行替換，避免被誤認為 JSX
          find ./blog ./docs -name "*.md" -exec sed -i 's/<\([^>]*\)>/\\<\1\\>/g' {} +
          
          # 4. 處理檔名日期 (Docusaurus 必要)
          cd blog
          for f in *.md; do
            if [[ ! $f =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}- ]]; then
              mv "$f" "2026-03-23-$f"
            fi
          done
          cd ..

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 直接攻頂 Node 24

      - name: 📦 Install & Build
        run: |
          # 如果沒有 package.json，這步會失敗，請確認你的 Repo 根目錄有這個檔
          npm install
          npm run build

      - name: 🔍 Check Build Result
        run: |
          echo "Check if index.html exists in build:"
          ls -lh build/index.html
          echo "Check if there are any other html files:"
          find build -name "*.html"
      
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
